<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archimedes · API Explorer</title>
    <style>
        body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; color: #222; }
        h1 { font-size: 20px; }
        table { border-collapse: collapse; width: 100%; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; vertical-align: top; }
        th { background: #f5f5f5; position: sticky; top: 0; }
        .m { font-weight: 600; }
        .dep { text-decoration: line-through; color: #999; }
        code { background: #f2f2f2; padding: 1px 4px; border-radius: 3px; }
        .count { color: #666; font-size: 12px; margin-left: 8px; font-weight: normal; }
        .kind { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; background: #e8f0fe; color: #1a56b0; }
        .empty { color: #999; font-style: italic; }
        #tabs { border-bottom: 2px solid #1a56b0; margin-top: 16px; }
        .tab-btn { background: none; border: none; padding: 8px 14px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: #555; }
        .tab-btn.active { color: #1a56b0; border-bottom-color: #1a56b0; font-weight: 600; }
        .tab-badge { background: #eee; border-radius: 8px; padding: 0 6px; font-size: 11px; color: #666; margin-left: 5px; }
        .panel { display: none; margin-top: 12px; }
        .panel.active { display: block; }
        .toolbar { margin-top: 12px; }
        #q { padding: 8px; width: 320px; font-size: 14px; }
        #restMethod { padding: 7px; font-size: 13px; margin-left: 8px; }
        .chip { display: inline-block; padding: 2px 10px; border: 1px solid #ccc; border-radius: 12px; font-size: 12px; cursor: pointer; margin-left: 6px; }
        .chip.on { background: #1a56b0; color: #fff; border-color: #1a56b0; }
        .meta { color: #888; font-size: 11px; margin-top: 2px; }
        .try-btn { padding: 2px 10px; font-size: 12px; cursor: pointer; }
        .try-cell { background: #fafbfd; padding: 12px; }
        .try-cell h3 { margin: 10px 0 4px; font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: .04em; }
        .try-cell input, .try-cell select, .try-cell button { font-size: 12px; padding: 4px 6px; margin: 2px 6px 2px 0; }
        .try-cell textarea { font-size: 12px; padding: 4px 6px; width: 60%; min-height: 80px; font-family: Consolas, Menlo, monospace; display: block; }
        .send-btn { background: #1a56b0; color: #fff; border: 1px solid #1a56b0; border-radius: 3px; padding: 5px 18px; cursor: pointer; }
        .kv input { width: 170px; }
        .req { color: #c0392b; }
        .result pre { background: #f2f2f2; padding: 10px; overflow: auto; max-height: 320px; font-size: 12px; margin: 4px 0; white-space: pre-wrap; word-break: break-all; }
        .status-ok { color: #0a7d38; font-weight: 600; }
        .status-err { color: #c0392b; font-weight: 600; }
        table.schema { width: auto; min-width: 55%; margin: 4px 0 6px; }
    </style>
</head>
<body>
<h1>Archimedes · API Explorer</h1>

<!-- 认证栏：根据 security 配置显示不同认证输入方式（参考 Swagger UI 的 Authorize 弹窗） -->
<div id="authBar" style="display:none;margin-bottom:12px;padding:8px 12px;background:#f8f9fa;border:1px solid #ddd;border-radius:4px;font-size:13px">
    <strong>🔒 Authorize</strong>
    <span id="authType" class="count"></span>
    <span id="authInputs" style="margin-left:8px"></span>
    <button onclick="saveAuth()" style="padding:3px 12px;font-size:12px;margin-left:6px">Apply</button>
    <span id="authStatus" class="meta" style="margin-left:8px"></span>
</div>

<nav id="tabs">
    <button class="tab-btn" id="tabbtn-rest" onclick="switchTab('rest')">REST<span class="tab-badge" id="badge-rest">0</span></button>
    <button class="tab-btn" id="tabbtn-ws" onclick="switchTab('ws')">WebSocket<span class="tab-badge" id="badge-ws">0</span></button>
    <button class="tab-btn" id="tabbtn-rpc" onclick="switchTab('rpc')">RPC<span class="tab-badge" id="badge-rpc">0</span></button>
    <button class="tab-btn" id="tabbtn-tr" onclick="switchTab('tr')">TR<span class="tab-badge" id="badge-tr">0</span></button>
    <button class="tab-btn" id="tabbtn-config" onclick="switchTab('config')">Config<span class="tab-badge" id="badge-config">0</span></button>
    <button class="tab-btn" id="tabbtn-trace" onclick="switchTab('trace')">Trace Logs</button>
</nav>

<div class="toolbar">
    <input id="q" placeholder="filter by path / method / class..." oninput="render()">
    <select id="restMethod" onchange="render()"><option value="">all methods</option></select>
    <span id="chips-rpc"></span>
    <span id="chips-tr"></span>
</div>

<section class="panel" id="panel-rest">
    <table>
        <thead>
        <tr><th>Method</th><th>Path</th><th>Handler</th><th>Params</th><th>Returns</th><th style="width:60px">Try</th></tr>
        </thead>
        <tbody id="restRows"></tbody>
    </table>
    <span class="count" id="restCount"></span>
</section>

<section class="panel" id="panel-ws">
    <table>
        <thead>
        <tr><th>Kind</th><th>Path / Destination</th><th>Handler</th><th>SockJS</th></tr>
        </thead>
        <tbody id="wsRows"></tbody>
    </table>
    <span class="count" id="wsCount"></span>
</section>

<section class="panel" id="panel-rpc">
    <table>
        <thead>
        <tr><th>Protocol</th><th>Service</th><th>Version / Group</th><th>Methods</th></tr>
        </thead>
        <tbody id="rpcRows"></tbody>
    </table>
    <span class="count" id="rpcCount"></span>
</section>

<section class="panel" id="panel-tr">
    <table>
        <thead>
        <tr><th>Protocol</th><th>Service</th><th>Version / Group</th><th>Methods</th></tr>
        </thead>
        <tbody id="trRows"></tbody>
    </table>
    <span class="count" id="trCount"></span>
</section>

<section class="panel" id="panel-config">
    <div>
        <input id="configQ" placeholder="filter by key / value / source..." oninput="renderConfig()"
               style="padding:8px;width:320px;font-size:14px;">
        <button onclick="loadConfig()" style="padding:8px 16px;font-size:14px;">Refresh</button>
        <span class="count" id="configCount"></span>
        <span id="configHotDisabled" class="meta" style="color:#c0392b"></span>
        <span id="configStatus" class="meta" style="margin-left:8px"></span>
    </div>
    <table style="margin-top:8px;">
        <thead>
        <tr><th style="width:32%">Key</th><th>Value</th><th style="width:22%">Source</th><th style="width:150px">Actions</th></tr>
        </thead>
        <tbody id="configRows"><tr><td colspan="4" class="empty">loading...</td></tr></tbody>
    </table>
</section>

<section class="panel" id="panel-trace">
    <div>
        <input id="traceIdInput" placeholder="enter traceId to query logs..." style="padding:8px;width:320px;font-size:14px;">
        <button onclick="queryTrace()" style="padding:8px 16px;font-size:14px;">Query</button>
        <span class="count" id="traceCount"></span>
    </div>
    <table style="margin-top:8px;">
        <thead>
        <tr><th>Time</th><th>Thread</th><th>Level</th><th>Logger</th><th>Message</th></tr>
        </thead>
        <tbody id="traceRows"><tr><td colspan="5" class="empty">enter a traceId and query</td></tr></tbody>
    </table>
</section>

<script>
    var API_URL = "__ARCHIMEDES_API_URL__";
    var BASE_URL = API_URL.replace(/\/apis$/, '');
    var TABS = ['rest', 'ws', 'rpc', 'tr', 'config', 'trace'];
    var TR_PROTOCOLS = ['SOFA_TR', 'TRPC'];
    var catalog = { restApis: [], webSocketApis: [], rpcApis: [] };
    var currentTab = 'rest';
    var protoFilter = { rpc: 'ALL', tr: 'ALL' };
    var restRendered = [];
    var openTry = -1;
    var tryApi = null;
    var securityConfig = null;  // {type, headerName, bearerPrefix, apiKeyIn, apiKeyName, saTokenName}
    var authToken = '';         // 用户输入的认证 token/密码
    var configData = null;      // /config 响应：{hotRefreshEnabled, dynamicKeys, propertySources}
    var configLoaded = false;   // 配置中心懒加载标记
    var configRowRefs = [];     // 渲染行 → {key, value, sensitive} 映射（编辑/应用时按下标取回）

    function esc(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
            return {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[c];
        });
    }

    /* ---------- tabs ---------- */

    function switchTab(name) {
        currentTab = name;
        for (var i = 0; i < TABS.length; i++) {
            var t = TABS[i];
            document.getElementById('tabbtn-' + t).className = 'tab-btn' + (t === name ? ' active' : '');
            document.getElementById('panel-' + t).className = 'panel' + (t === name ? ' active' : '');
        }
        document.getElementById('q').style.display = (name === 'trace' || name === 'config') ? 'none' : '';
        document.getElementById('restMethod').style.display = name === 'rest' ? '' : 'none';
        document.getElementById('chips-rpc').style.display = name === 'rpc' ? '' : 'none';
        document.getElementById('chips-tr').style.display = name === 'tr' ? '' : 'none';
        // 配置中心懒加载：首次切入时才拉取（避免无谓请求）
        if (name === 'config' && !configLoaded) { configLoaded = true; loadConfig(); }
        if (history.replaceState) { history.replaceState(null, '', '#' + name); } else { location.hash = name; }
    }

    function splitRpc(all) {
        var out = { rpc: [], tr: [] };
        for (var i = 0; i < all.length; i++) {
            (TR_PROTOCOLS.indexOf(all[i].protocol) >= 0 ? out.tr : out.rpc).push(all[i]);
        }
        return out;
    }

    function render() {
        var q = document.getElementById('q').value.toLowerCase();
        renderRest(q);
        renderWs(q);
        var split = splitRpc(catalog.rpcApis || []);
        renderRpcInto('rpc', split.rpc, q);
        renderRpcInto('tr', split.tr, q);
        document.getElementById('badge-rest').textContent = (catalog.restApis || []).length;
        document.getElementById('badge-ws').textContent = (catalog.webSocketApis || []).length;
        document.getElementById('badge-rpc').textContent = split.rpc.length;
        document.getElementById('badge-tr').textContent = split.tr.length;
    }

    /* ---------- REST tab ---------- */

    function paramText(p) {
        return p.map(function (x) { return x.name + ':' + x.source; }).join(', ');
    }

    function renderRest(q) {
        openTry = -1;
        tryApi = null;
        var all = catalog.restApis || [];
        var mf = document.getElementById('restMethod').value;
        var rows = all.filter(function (a) {
            var hay = (a.httpMethods.join(' ') + ' ' + a.paths.join(' ') + ' ' + a.controllerClass
                + ' ' + (a.summary || '') + ' ' + (a.tag || '')).toLowerCase();
            return hay.indexOf(q) >= 0 && (!mf || a.httpMethods.indexOf(mf) >= 0);
        });
        restRendered = rows;
        document.getElementById('restCount').textContent = ' (' + rows.length + '/' + all.length + ')';
        // 按模块（tag）分组渲染，每组前插入模块标题行
        var grouped = groupByTag(rows);
        var html = '';
        for (var g = 0; g < grouped.length; g++) {
            var group = grouped[g];
            html += '<tr><td colspan="7" style="background:#eef2f7;font-weight:600;font-size:13px;padding:8px">'
                + esc(group.tag) + (group.tagDesc ? ' <span class="meta">— ' + esc(group.tagDesc) + '</span>' : '')
                + '</td></tr>';
            for (var j = 0; j < group.items.length; j++) {
                var a = group.items[j];
                var idx = rows.indexOf(a);
                var cls = a.deprecated ? ' class="dep"' : '';
                var desc = a.summary ? '<br><span class="meta">' + esc(a.summary) + '</span>' : '';
                html += '<tr id="rest-r' + idx + '"' + cls + '>'
                    + '<td class="m">' + esc(a.httpMethods.join(', ')) + '</td>'
                    + '<td>' + a.paths.map(function (p) { return '<code>' + esc(p) + '</code>'; }).join('<br>') + '</td>'
                    + '<td>' + esc(a.controllerClass.split('.').pop()) + '#' + esc(a.handlerMethod) + desc + '</td>'
                    + '<td>' + esc(paramText(a.params)) + '</td>'
                    + '<td><code>' + esc(a.returnType) + '</code></td>'
                    + '<td><button class="try-btn" onclick="toggleTry(' + idx + ')">Try</button></td>'
                    + '</tr>';
            }
        }
        document.getElementById('restRows').innerHTML = rows.length === 0
            ? '<tr><td colspan="7" class="empty">no REST endpoints</td></tr>' : html;
    }

    /** 按 tag（模块）分组，保持原序。 */
    function groupByTag(apis) {
        var map = {}, order = [];
        apis.forEach(function (a) {
            var t = a.tag || a.controllerClass.split('.').pop();
            if (!map[t]) { map[t] = { tag: t, tagDesc: a.tagDescription || '', items: [] }; order.push(t); }
            map[t].items.push(a);
        });
        return order.map(function (t) { return map[t]; });
    }

    function populateMethodFilter() {
        var methods = [];
        (catalog.restApis || []).forEach(function (a) {
            a.httpMethods.forEach(function (m) {
                if (methods.indexOf(m) < 0) { methods.push(m); }
            });
        });
        methods.sort();
        var sel = document.getElementById('restMethod');
        sel.innerHTML = '<option value="">all methods</option>' + methods.map(function (m) {
            return '<option value="' + esc(m) + '">' + esc(m) + '</option>';
        }).join('');
    }

    /* ---------- REST try-it ---------- */

    function toggleTry(i) {
        var existing = document.getElementById('tryRow');
        var wasOpen = openTry;
        if (existing) { existing.parentNode.removeChild(existing); }
        openTry = -1;
        tryApi = null;
        if (wasOpen === i) { return; }
        openTry = i;
        tryApi = restRendered[i];
        var row = document.getElementById('rest-r' + i);
        var tr = document.createElement('tr');
        tr.id = 'tryRow';
        tr.innerHTML = '<td colspan="6" class="try-cell">' + tryFormHtml(tryApi) + '</td>';
        row.parentNode.insertBefore(tr, row.nextSibling);
        renderTryPathVars();
    }

    function kvRowHtml(name, required, desc) {
        return '<div class="kv"><input placeholder="name" class="kv-k" value="' + esc(name) + '">'
            + ' = <input placeholder="value" class="kv-v">'
            + (required ? '<span class="req" title="required">*</span>' : '')
            + (desc ? ' <span class="meta">' + esc(desc) + '</span>' : '')
            + '</div>';
    }

    /* 按 schema 生成示例 JSON：叶子按类型给 0/false/""，集合包一层数组，Map 给空对象 */
    function leafExample(type) {
        var t = String(type);
        if (/^(int|long|short|byte|double|float|Integer|Long|Short|Byte|Double|Float|BigDecimal|BigInteger|Number)$/.test(t)) { return 0; }
        if (/^(boolean|Boolean)$/.test(t)) { return false; }
        return '';
    }

    function exampleFromSchema(node) {
        var value;
        // 枚举字段：取第一个可选值作为示例
        if (node.enumValues && node.enumValues.length) {
            value = node.enumValues[0];
        } else if (/^Map</.test(node.type)) {
            value = {};
        } else if (node.children && node.children.length) {
            value = {};
            node.children.forEach(function (c) { value[c.name] = exampleFromSchema(c); });
        } else {
            value = leafExample(node.type);
        }
        return node.array ? [value] : value;
    }

    /* 字段表：字段/类型/必填/说明，嵌套字段缩进展示；枚举字段额外展示可选值 */
    function schemaRows(node, depth) {
        if (!node.children || !node.children.length) { return ''; }
        return node.children.map(function (c) {
            var indent = depth ? '<span style="display:inline-block;width:' + (depth * 16) + 'px"></span>' : '';
            var descHtml = esc(c.description || '');
            // 枚举字段标注可选值
            if (c.enumValues && c.enumValues.length) {
                descHtml += (descHtml ? ' ' : '') + '<code>' + c.enumValues.map(esc).join(' | ') + '</code>';
            }
            return '<tr>'
                + '<td>' + indent + esc(c.name) + '</td>'
                + '<td><code>' + esc(c.type) + (c.array ? '[]' : '') + '</code></td>'
                + '<td>' + (c.required ? '<span class="req">*</span>' : '') + '</td>'
                + '<td>' + descHtml + '</td>'
                + '</tr>' + schemaRows(c, depth + 1);
        }).join('');
    }

    function schemaTableHtml(title, schema) {
        if (!schema) { return ''; }
        var typeLabel = esc(schema.type) + (schema.array ? '[]' : '');
        var rows = schemaRows(schema, 0);
        if (!rows) {
            // 标量根：只标注类型，不出表格
            return '<h3>' + title + ' <span class="count">' + typeLabel + '</span></h3>';
        }
        return '<h3>' + title + ' <span class="count">' + typeLabel + '</span></h3>'
            + '<table class="schema"><thead><tr><th>Field</th><th>Type</th><th>Required</th><th>Description</th></tr></thead>'
            + '<tbody>' + rows + '</tbody></table>';
    }

    function tryFormHtml(api) {
        var methods = api.httpMethods.length ? api.httpMethods : ['GET', 'POST', 'PUT', 'DELETE', 'PATCH'];
        var queryRows = '', headerRows = '';
        var hasBodyParam = false;
        api.params.forEach(function (p) {
            if (p.source === 'QUERY') { queryRows += kvRowHtml(p.name, p.required, p.description); }
            if (p.source === 'HEADER') { headerRows += kvRowHtml(p.name, p.required, p.description); }
            if (p.source === 'BODY') { hasBodyParam = true; }
        });
        var mayHaveBody = hasBodyParam || methods.join(' ').match(/POST|PUT|PATCH|DELETE/);
        var ct = (api.consumes && api.consumes.length) ? api.consumes[0] : 'application/json';
        // 请求体预填：有 schema 按字段树生成示例 JSON，否则维持旧行为
        var bodyExample = hasBodyParam ? '{}' : '';
        if (api.requestBodySchema) {
            try { bodyExample = JSON.stringify(exampleFromSchema(api.requestBodySchema), null, 2); } catch (e) { }
        }
        var descLine = api.summary ? '<div class="meta" style="margin-bottom:6px">' + esc(api.summary)
            + (api.operationDescription ? ' — ' + esc(api.operationDescription) : '') + '</div>' : '';
        return descLine + '<div>'
            + '<span style="display:inline-block;padding:4px 8px;background:#e8e8e8;color:#555;border-radius:3px;font-weight:600;font-size:12px;cursor:default">'
                + esc(methods[0]) + '</span> '
            + '<code style="background:#e8e8e8;padding:4px 8px;color:#555;border-radius:3px">'
                + esc(api.paths[0]) + '</code>'
            + '<input type="hidden" id="tryMethod" value="' + esc(methods[0]) + '">'
            + '<input type="hidden" id="tryPath" value="' + esc(api.paths[0]) + '">'
            + '<span id="tryPathVars"></span>'
            + '<button class="send-btn" style="margin-left:8px" onclick="sendTryRequest()">Send</button>'
            + '</div>'
            + '<h3>Query Params</h3><div id="tryQuery">' + queryRows + '</div>'
            + '<button class="try-btn" onclick="addKvRow(\'tryQuery\')">+ param</button>'
            + '<h3>Headers</h3><div id="tryHeaders">' + headerRows + '</div>'
            + '<button class="try-btn" onclick="addKvRow(\'tryHeaders\')">+ header</button>'
            + (mayHaveBody
                ? '<h3>Body</h3><div>Content-Type <input id="tryCt" value="' + esc(ct) + '" style="width:220px"></div>'
                    + '<textarea id="tryBody" placeholder="request body (skipped for GET/HEAD)">'
                    + esc(bodyExample) + '</textarea>'
                : '')
            + schemaTableHtml('Request Fields', api.requestBodySchema)
            + schemaTableHtml('Response Fields', api.responseSchema)
            + '<div class="result" id="tryResult"></div>';
    }

    function addKvRow(containerId) {
        var d = document.createElement('div');
        d.innerHTML = kvRowHtml('', false);
        document.getElementById(containerId).appendChild(d.firstChild);
    }

    function pathVarNames(path) {
        var out = [];
        var m = String(path).match(/\{[^}]+\}/g) || [];
        for (var i = 0; i < m.length; i++) { out.push(m[i].slice(1, -1).split(':')[0]); }
        return out;
    }

    function renderTryPathVars() {
        var names = pathVarNames(document.getElementById('tryPath').value);
        document.getElementById('tryPathVars').innerHTML = names.map(function (n) {
            // 路径变量说明：从契约 PATH 参数按名匹配（title 悬浮展示）
            var desc = '';
            if (tryApi) {
                tryApi.params.forEach(function (p) {
                    if (p.source === 'PATH' && p.name === n && p.description) { desc = p.description; }
                });
            }
            return ' <label><code>{' + esc(n) + '}</code>=</label><input class="pv" data-name="' + esc(n) + '"'
                + (desc ? ' title="' + esc(desc) + '"' : '') + ' style="width:110px">';
        }).join('');
    }

    function collectKv(containerId) {
        var out = [];
        var rows = document.getElementById(containerId).getElementsByClassName('kv');
        for (var i = 0; i < rows.length; i++) {
            var k = rows[i].getElementsByClassName('kv-k')[0].value.trim();
            var v = rows[i].getElementsByClassName('kv-v')[0].value;
            if (k) { out.push({ k: k, v: v }); }
        }
        return out;
    }

    /**
     * 发送前校验：检查必填、正则、长度、数值范围（来自 schema/param 的 validation 规则），
     * 类似于表单校验。返回错误数组，空数组表示通过。
     */
    function validateBeforeSend() {
        var errors = [];
        if (!tryApi) { return errors; }
        // 1) 校验路径变量（必填）
        var pvs = document.querySelectorAll('#tryPathVars .pv');
        for (var i = 0; i < pvs.length; i++) {
            if (!pvs[i].value.trim()) {
                errors.push('路径变量 {' + pvs[i].getAttribute('data-name') + '} 不能为空');
            }
        }
        // 2) 校验 Query/Header 参数
        tryApi.params.forEach(function (p) {
            if (p.source !== 'QUERY' && p.source !== 'HEADER') { return; }
            var inputs = document.querySelectorAll('#try' + (p.source === 'QUERY' ? 'Query' : 'Headers') + ' .kv');
            for (var j = 0; j < inputs.length; j++) {
                var k = inputs[j].getElementsByClassName('kv-k')[0];
                if (k && k.value === p.name) {
                    var v = inputs[j].getElementsByClassName('kv-v')[0].value;
                    errors = errors.concat(validateValue(p.name, v, p.required, p.validation));
                }
            }
        });
        // 3) 校验请求体字段（逐字段递归匹配 JSON）
        if (tryApi.requestBodySchema) {
            var bodyEl = document.getElementById('tryBody');
            if (bodyEl && bodyEl.value.trim()) {
                try {
                    var bodyObj = JSON.parse(bodyEl.value);
                    validateSchemaFields('', bodyObj, tryApi.requestBodySchema, errors);
                } catch (e) {
                    errors.push('请求体 JSON 格式错误: ' + e.message);
                }
            }
        }
        return errors;
    }

    function validateValue(name, value, required, rules) {
        var errs = [];
        if (required && (value === '' || value === null || value === undefined)) {
            errs.push(name + ' 是必填项');
            return errs;
        }
        if (!rules || value === '' || value === null || value === undefined) { return errs; }
        if (rules.pattern && !new RegExp(rules.pattern).test(value)) {
            errs.push(name + ' 不匹配格式要求: ' + rules.pattern);
        }
        if (rules.minLength !== undefined && String(value).length < rules.minLength) {
            errs.push(name + ' 长度不能小于 ' + rules.minLength);
        }
        if (rules.maxLength !== undefined && String(value).length > rules.maxLength) {
            errs.push(name + ' 长度不能大于 ' + rules.maxLength);
        }
        if (rules.min !== undefined && Number(value) < Number(rules.min)) {
            errs.push(name + ' 不能小于 ' + rules.min);
        }
        if (rules.max !== undefined && Number(value) > Number(rules.max)) {
            errs.push(name + ' 不能大于 ' + rules.max);
        }
        if (rules.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
            errs.push(name + ' 不是有效的邮箱格式');
        }
        if (rules.notBlank && String(value).trim() === '') {
            errs.push(name + ' 不能为空白');
        }
        return errs;
    }

    function validateSchemaFields(prefix, obj, schema, errors) {
        if (!schema || !schema.children || !obj || typeof obj !== 'object') { return; }
        schema.children.forEach(function (field) {
            var fullName = prefix ? prefix + '.' + field.name : field.name;
            var val = obj[field.name];
            // 必填校验
            if (field.required && (val === undefined || val === null || val === '')) {
                errors.push(fullName + ' 是必填项');
            }
            // validation 规则校验
            if (val !== undefined && val !== null && field.validation) {
                errors = errors.concat(validateValue(fullName, val, false, field.validation));
            }
            // 枚举值校验
            if (field.enumValues && field.enumValues.length && val !== undefined && val !== null) {
                if (field.enumValues.indexOf(String(val)) < 0) {
                    errors.push(fullName + ' 只能为: ' + field.enumValues.join(' / '));
                }
            }
            // 递归校验嵌套对象
            if (field.children && field.children.length && val && typeof val === 'object' && !Array.isArray(val)) {
                validateSchemaFields(fullName, val, field, errors);
            }
            // 数组元素逐一校验
            if (field.array && Array.isArray(val)) {
                val.forEach(function (item, idx) {
                    if (field.children && field.children.length && item && typeof item === 'object') {
                        validateSchemaFields(fullName + '[' + idx + ']', item, field, errors);
                    }
                });
            }
        });
    }

    function sendTryRequest() {
        // 发送前表单校验（类似表单提交前校验）
        var validationErrors = validateBeforeSend();
        if (validationErrors.length > 0) {
            document.getElementById('tryResult').innerHTML =
                '<div class="status-err">参数校验失败：</div><ul style="color:#c0392b;font-size:12px;margin:4px 0">'
                + validationErrors.map(function (e) { return '<li>' + esc(e) + '</li>'; }).join('') + '</ul>';
            return;
        }
        var method = document.getElementById('tryMethod').value;
        var path = document.getElementById('tryPath').value;
        var pvs = document.querySelectorAll('#tryPathVars .pv');
        for (var i = 0; i < pvs.length; i++) {
            var name = pvs[i].getAttribute('data-name').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            path = path.replace(new RegExp('\\{' + name + '(:[^}]*)?\\}'), encodeURIComponent(pvs[i].value));
        }
        var qs = collectKv('tryQuery').map(function (p) {
            return encodeURIComponent(p.k) + '=' + encodeURIComponent(p.v);
        });
        var url = path + (qs.length ? (path.indexOf('?') >= 0 ? '&' : '?') + qs.join('&') : '');
        var headers = {};
        // 注入认证头（Spring Security / Sa-Token 等）
        injectAuthHeaders(headers);
        collectKv('tryHeaders').forEach(function (h) { headers[h.k] = h.v; });
        var opts = { method: method, headers: headers };
        var bodyEl = document.getElementById('tryBody');
        if (bodyEl && bodyEl.value !== '' && method !== 'GET' && method !== 'HEAD') {
            opts.body = bodyEl.value;
            var ct = document.getElementById('tryCt').value.trim();
            if (ct) { headers['Content-Type'] = ct; }
        }
        // 注入 API Key Query 参数（apiKeyIn=QUERY 时）
        url = injectAuthQuery(url);
        var t0 = Date.now();
        document.getElementById('tryResult').innerHTML = '<span class="empty">sending...</span>';
        fetch(url, opts)
            .then(function (r) {
                return r.text().then(function (txt) { return { r: r, txt: txt, ms: Date.now() - t0 }; });
            })
            .then(function (res) { renderTryResult(res.r, res.txt, res.ms); })
            .catch(function (e) {
                document.getElementById('tryResult').innerHTML =
                    '<span class="status-err">Request failed: ' + esc(e) + '</span>';
            });
    }

    function renderTryResult(r, txt, ms) {
        var pretty = txt;
        try { pretty = JSON.stringify(JSON.parse(txt), null, 2); } catch (e) { /* keep raw */ }
        var headerLines = [];
        var traceId = null;
        r.headers.forEach(function (v, k) {
            headerLines.push(k + ': ' + v);
            if (traceId === null && k.toLowerCase().indexOf('trace') >= 0) { traceId = v; }
        });
        var cls = r.status < 400 ? 'status-ok' : 'status-err';
        document.getElementById('tryResult').innerHTML =
            '<div><span class="' + cls + '">HTTP ' + r.status + '</span>'
            + '<span class="count">' + ms + ' ms</span>'
            + (traceId
                ? ' <button class="try-btn" data-trace="' + esc(traceId)
                    + '" onclick="jumpToTrace(this.getAttribute(\'data-trace\'))">View trace logs</button>'
                : '')
            + '</div>'
            + '<h3>Response Headers</h3><pre>' + esc(headerLines.join('\n')) + '</pre>'
            + '<h3>Response Body</h3><pre>' + (pretty === '' ? '(empty)' : esc(pretty)) + '</pre>';
    }

    function jumpToTrace(traceId) {
        switchTab('trace');
        document.getElementById('traceIdInput').value = traceId;
        queryTrace();
    }

    /* ---------- WebSocket tab ---------- */

    function renderWs(q) {
        var all = catalog.webSocketApis || [];
        var rows = all.filter(function (w) {
            var hay = (w.kind + ' ' + w.path + ' ' + w.handlerClass).toLowerCase();
            return hay.indexOf(q) >= 0;
        });
        document.getElementById('wsCount').textContent = ' (' + rows.length + '/' + all.length + ')';
        document.getElementById('wsRows').innerHTML = rows.length === 0
            ? '<tr><td colspan="4" class="empty">no WebSocket endpoints</td></tr>'
            : rows.map(function (w) {
                var handler = w.handlerClass ? w.handlerClass.split('.').pop() : '';
                if (w.handlerMethod) { handler += '#' + w.handlerMethod; }
                return '<tr>'
                    + '<td><span class="kind">' + esc(w.kind) + '</span></td>'
                    + '<td><code>' + esc(w.path) + '</code></td>'
                    + '<td>' + esc(handler) + '</td>'
                    + '<td>' + (w.sockJs ? 'yes' : '') + '</td>'
                    + '</tr>';
            }).join('');
    }

    /* ---------- RPC / TR tabs ---------- */

    function simpleName(fqcn) {
        return String(fqcn).split('.').pop();
    }

    function methodText(m) {
        return m.methodName + '(' + m.parameterTypes.map(simpleName).join(', ') + ') : ' + simpleName(m.returnType);
    }

    function metaText(meta) {
        if (!meta) { return ''; }
        var parts = [];
        for (var k in meta) {
            if (meta.hasOwnProperty(k)) { parts.push(esc(k) + '=' + esc(meta[k])); }
        }
        return parts.length ? '<div class="meta">' + parts.join(' · ') + '</div>' : '';
    }

    function renderRpcInto(kind, all, q) {
        var pf = protoFilter[kind];
        var rows = all.filter(function (r) {
            var hay = (r.protocol + ' ' + r.serviceName + ' ' + (r.version || '') + ' ' + (r.group || '')).toLowerCase();
            return hay.indexOf(q) >= 0 && (pf === 'ALL' || r.protocol === pf);
        });
        document.getElementById(kind + 'Count').textContent = ' (' + rows.length + '/' + all.length + ')';
        document.getElementById(kind + 'Rows').innerHTML = rows.length === 0
            ? '<tr><td colspan="4" class="empty">no ' + (kind === 'tr' ? 'TR' : 'RPC') + ' services</td></tr>'
            : rows.map(function (r) {
                var vg = [r.version, r.group].filter(Boolean).join(' / ');
                return '<tr>'
                    + '<td><span class="kind">' + esc(r.protocol) + '</span></td>'
                    + '<td><code>' + esc(r.serviceName) + '</code>' + metaText(r.metadata) + '</td>'
                    + '<td>' + esc(vg) + '</td>'
                    + '<td>' + r.methods.map(function (m) {
                        return '<code>' + esc(methodText(m)) + '</code>';
                    }).join('<br>') + '</td>'
                    + '</tr>';
            }).join('');
        renderChips(kind, all);
    }

    function renderChips(kind, all) {
        var protos = [];
        for (var i = 0; i < all.length; i++) {
            if (protos.indexOf(all[i].protocol) < 0) { protos.push(all[i].protocol); }
        }
        protos.sort();
        document.getElementById('chips-' + kind).innerHTML = ['ALL'].concat(protos).map(function (p) {
            return '<span class="chip' + (protoFilter[kind] === p ? ' on' : '')
                + '" onclick="setProto(\'' + kind + '\',\'' + esc(p) + '\')">' + esc(p) + '</span>';
        }).join('');
    }

    function setProto(kind, p) {
        protoFilter[kind] = p;
        render();
    }

    /* ---------- Trace Logs tab ---------- */

    var threadColors = {};
    var colorPalette = ['#e8f0fe', '#fde8e8', '#e8fdf0', '#fdf6e8', '#f0e8fd', '#e8f8fd'];

    function threadBadge(thread) {
        if (!(thread in threadColors)) {
            threadColors[thread] = colorPalette[Object.keys(threadColors).length % colorPalette.length];
        }
        return '<span class="kind" style="background:' + threadColors[thread] + ';color:#333">' + esc(thread) + '</span>';
    }

    function queryTrace() {
        var traceId = document.getElementById('traceIdInput').value.trim();
        if (!traceId) { return; }
        threadColors = {};
        fetch(BASE_URL + '/logs/trace/' + encodeURIComponent(traceId) + '?page=1&size=500')
            .then(function (r) { return r.json(); })
            .then(function (j) {
                document.getElementById('traceCount').textContent = ' (' + j.logs.length + '/' + j.total + ')';
                document.getElementById('traceRows').innerHTML = j.logs.length === 0
                    ? '<tr><td colspan="5" class="empty">no logs captured for this traceId</td></tr>'
                    : j.logs.map(function (l) {
                        return '<tr>'
                            + '<td><code>' + esc(l.timestamp) + '</code></td>'
                            + '<td>' + threadBadge(l.thread) + '</td>'
                            + '<td class="m">' + esc(l.level) + '</td>'
                            + '<td>' + esc(l.logger.split('.').pop()) + '</td>'
                            + '<td>' + esc(l.message) + '</td>'
                            + '</tr>';
                    }).join('');
            })
            .catch(function (e) {
                document.getElementById('traceRows').innerHTML =
                    '<tr><td colspan="5">Failed to load: ' + esc(e) + '</td></tr>';
            });
    }

    /* ---------- Config tab ---------- */

    /** 拉取全量配置快照并渲染。 */
    function loadConfig() {
        fetch(BASE_URL + '/config')
            .then(function (r) { return r.json(); })
            .then(function (j) {
                configData = j;
                renderConfig();
            })
            .catch(function (e) {
                document.getElementById('configRows').innerHTML =
                    '<tr><td colspan="4">Failed to load: ' + esc(e) + '</td></tr>';
            });
    }

    /** 渲染配置表：按属性源分组（动态覆盖源高亮），支持 key/value/来源 文本过滤。 */
    function renderConfig() {
        if (!configData) { return; }
        var q = document.getElementById('configQ').value.toLowerCase();
        var hot = !!configData.hotRefreshEnabled;
        document.getElementById('configHotDisabled').textContent =
            hot ? '' : 'hot refresh disabled (archimedes.config.hot-refresh-enabled=false)';
        var dynamicKeys = configData.dynamicKeys || [];
        var sources = configData.propertySources || [];
        configRowRefs = [];
        var html = '', shown = 0, total = 0;
        for (var i = 0; i < sources.length; i++) {
            var src = sources[i];
            var isDynSrc = src.name === 'archimedesDynamicConfig';
            var entries = src.entries || [];
            total += entries.length;
            var rows = '';
            for (var j = 0; j < entries.length; j++) {
                var en = entries[j];
                var hay = (en.key + ' ' + (en.value || '') + ' ' + src.name).toLowerCase();
                if (hay.indexOf(q) < 0) { continue; }
                shown++;
                var idx = configRowRefs.length;
                configRowRefs.push({ key: en.key, value: en.value, sensitive: en.sensitive });
                var overridden = isDynSrc && dynamicKeys.indexOf(en.key) >= 0;
                var actions = '';
                if (hot) {
                    // 热更新开启才提供编辑；动态覆盖项额外提供移除（恢复原值）
                    actions = '<button class="try-btn" onclick="editConfig(' + idx + ')">Edit</button>'
                        + (overridden
                            ? ' <button class="try-btn" onclick="removeConfig(' + idx + ')">Remove</button>'
                            : '');
                }
                rows += '<tr' + (overridden ? ' style="background:#fffbe8"' : '') + '>'
                    + '<td><code>' + esc(en.key) + '</code>'
                        + (en.sensitive ? ' <span class="kind" style="background:#fde8e8;color:#8a2c2c">sensitive</span>' : '')
                    + '</td>'
                    + '<td id="cfgv-' + idx + '">' + esc(en.value === null || en.value === undefined ? '' : en.value) + '</td>'
                    + '<td class="meta">' + esc(src.name) + '</td>'
                    + '<td>' + actions + '</td>'
                    + '</tr>';
            }
            if (rows) {
                html += '<tr><td colspan="4" style="background:' + (isDynSrc ? '#fff3cd' : '#eef2f7')
                    + ';font-weight:600;font-size:13px;padding:8px">' + esc(src.name)
                    + (isDynSrc ? ' <span class="kind" style="background:#f7c948;color:#5a4500">dynamic override</span>' : '')
                    + '</td></tr>' + rows;
            }
        }
        document.getElementById('configCount').textContent = ' (' + shown + '/' + total + ')';
        document.getElementById('badge-config').textContent = total;
        document.getElementById('configRows').innerHTML =
            html || '<tr><td colspan="4" class="empty">no config entries</td></tr>';
    }

    /** 行内编辑：把值单元格替换为输入框 + Apply/Cancel；敏感值不回填明文，留空输入新值。 */
    function editConfig(idx) {
        var ref = configRowRefs[idx];
        var cell = document.getElementById('cfgv-' + idx);
        if (!cell) { return; }
        var initial = ref.sensitive ? '' : (ref.value === null || ref.value === undefined ? '' : ref.value);
        cell.innerHTML = '<input id="cfge-' + idx + '" value="' + esc(initial) + '"'
            + (ref.sensitive ? ' placeholder="(masked — enter new value)"' : '')
            + ' style="width:70%;padding:4px 6px;font-size:12px">'
            + ' <button class="send-btn" style="padding:3px 12px" onclick="applyConfig(' + idx + ')">Apply</button>'
            + ' <button class="try-btn" onclick="renderConfig()">Cancel</button>';
        document.getElementById('cfge-' + idx).focus();
    }

    /** 应用编辑：调用热更新端点写入动态覆盖。 */
    function applyConfig(idx) {
        var input = document.getElementById('cfge-' + idx);
        if (!input) { return; }
        postConfigUpdate(configRowRefs[idx].key, input.value);
    }

    /** 移除动态覆盖（value 缺省 = 删除语义，恢复底层原值）。 */
    function removeConfig(idx) {
        postConfigUpdate(configRowRefs[idx].key, null);
    }

    function postConfigUpdate(key, value) {
        var payload = value === null ? { key: key } : { key: key, value: String(value) };
        setConfigStatus('applying ' + key + ' ...', false);
        fetch(BASE_URL + '/config/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(function (r) {
                return r.json().then(function (j) { return { ok: r.ok, body: j }; });
            })
            .then(function (res) {
                if (res.ok) {
                    setConfigStatus('✓ applied: ' + key
                        + (res.body.refreshedBeans && res.body.refreshedBeans.length
                            ? ' (rebound: ' + res.body.refreshedBeans.join(', ') + ')' : ''), false);
                } else {
                    setConfigStatus('✗ ' + (res.body && res.body.error ? res.body.error : 'update failed'), true);
                }
                loadConfig(); // 无论成败都刷新（拿到最新 dynamicKeys 与生效值）
            })
            .catch(function (e) {
                setConfigStatus('✗ request failed: ' + e, true);
            });
    }

    function setConfigStatus(text, isError) {
        var el = document.getElementById('configStatus');
        el.textContent = text;
        el.style.color = isError ? '#c0392b' : '#0a7d38';
    }

    /* ---------- auth ---------- */

    /** 加载安全认证配置并渲染认证栏。 */
    function loadSecurityConfig() {
        fetch(BASE_URL + '/security')
            .then(function (r) { return r.json(); })
            .then(function (cfg) {
                securityConfig = cfg;
                if (!cfg || cfg.type === 'NONE') { return; }
                var bar = document.getElementById('authBar');
                bar.style.display = '';
                document.getElementById('authType').textContent = cfg.type;
                var html = '';
                if (cfg.type === 'BEARER' || cfg.type === 'SA_TOKEN') {
                    html = '<input id="authTokenInput" placeholder="输入 Token" style="width:280px;padding:4px">';
                } else if (cfg.type === 'BASIC') {
                    html = '<input id="authUser" placeholder="用户名" style="width:120px;padding:4px">'
                        + ' : <input id="authPass" placeholder="密码" type="password" style="width:120px;padding:4px">';
                } else if (cfg.type === 'API_KEY') {
                    html = '<input id="authTokenInput" placeholder="输入 API Key" style="width:280px;padding:4px">';
                }
                document.getElementById('authInputs').innerHTML = html;
                // 尝试从 localStorage 恢复上次的 token
                var saved = localStorage.getItem('archimedes_auth_token');
                if (saved) {
                    authToken = saved;
                    var inp = document.getElementById('authTokenInput');
                    if (inp) { inp.value = saved; }
                    document.getElementById('authStatus').textContent = '✓ 已认证';
                }
            })
            .catch(function () { /* 安全端点不存在或出错时静默降级 */ });
    }

    function saveAuth() {
        if (!securityConfig) { return; }
        if (securityConfig.type === 'BASIC') {
            var u = document.getElementById('authUser').value;
            var p = document.getElementById('authPass').value;
            authToken = btoa(u + ':' + p); // Base64 编码
        } else {
            var inp = document.getElementById('authTokenInput');
            authToken = inp ? inp.value.trim() : '';
        }
        localStorage.setItem('archimedes_auth_token', authToken);
        document.getElementById('authStatus').textContent = authToken ? '✓ 已认证' : '未认证';
    }

    /** 在 try-it 的 fetch 请求中注入认证头（在 sendTryRequest 中调用）。 */
    function injectAuthHeaders(headers) {
        if (!securityConfig || !authToken) { return; }
        switch (securityConfig.type) {
            case 'BEARER':
                headers[securityConfig.headerName || 'Authorization'] =
                    (securityConfig.bearerPrefix || 'Bearer ') + authToken;
                break;
            case 'BASIC':
                headers['Authorization'] = 'Basic ' + authToken;
                break;
            case 'API_KEY':
                if (securityConfig.apiKeyIn === 'HEADER') {
                    headers[securityConfig.headerName || securityConfig.apiKeyName || 'api_key'] = authToken;
                }
                // QUERY 方式在 URL 拼接中处理
                break;
            case 'SA_TOKEN':
                // Sa-Token 默认从 header 传递 token
                headers[securityConfig.saTokenName || 'satoken'] = authToken;
                break;
        }
    }

    /** 在 URL 中注入 API Key Query 参数（apiKeyIn=QUERY 时使用）。 */
    function injectAuthQuery(url) {
        if (!securityConfig || !authToken || securityConfig.type !== 'API_KEY'
                || securityConfig.apiKeyIn !== 'QUERY') {
            return url;
        }
        var paramName = securityConfig.apiKeyName || 'api_key';
        var sep = url.indexOf('?') >= 0 ? '&' : '?';
        return url + sep + encodeURIComponent(paramName) + '=' + encodeURIComponent(authToken);
    }

    /* ---------- init ---------- */

    /** 首次加载：fetch 拉取当前契约。 */
    fetch(API_URL)
        .then(function (r) { return r.json(); })
        .then(function (j) {
            catalog = j;
            populateMethodFilter();
            render();
            // 首次加载成功后建立 SSE 热监听连接（自动接收后续更新）
            startWatch();
            // 加载安全认证配置（决定 UI 是否显示认证栏）
            loadSecurityConfig();
        })
        .catch(function (e) {
            document.getElementById('restRows').innerHTML =
                '<tr><td colspan="7">Failed to load: ' + esc(e) + '</td></tr>';
        });

    /** SSE 热监听：建立 EventSource 连接，服务端检测到契约变化时自动推送更新。 */
    function startWatch() {
        if (typeof EventSource === 'undefined') { return; } // 浏览器不支持 SSE 时静默降级
        var watchUrl = BASE_URL + '/watch';
        var es = new EventSource(watchUrl);
        es.addEventListener('catalog', function (event) {
            try {
                var j = JSON.parse(event.data);
                catalog = j;
                populateMethodFilter();
                render();
            } catch (e) {
                // 解析失败静默忽略，等下一次推送
            }
        });
        es.onerror = function () {
            // EventSource 内置自动重连机制，此处无需手动处理
        };
    }

    var initialTab = (location.hash || '').replace('#', '');
    switchTab(TABS.indexOf(initialTab) >= 0 ? initialTab : 'rest');
</script>
